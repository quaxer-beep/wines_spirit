name: customer_app
description: Wines & Spirits Customer Mobile App
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_core:
    path: ../shared_core
  provider: ^6.1.0
  flutter_secure_storage: ^9.0.0
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.3.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  connectivity_plus: ^5.0.0
  local_auth: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
