version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      USE_SQLITE: "true"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data/pos_databases:/data/pos_databases

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      USE_SQLITE: "true"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data/pos_databases:/data/pos_databases

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: python -m app.tasks.scheduler
    environment:
      USE_SQLITE: "true"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data/pos_databases:/data/pos_databases

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
